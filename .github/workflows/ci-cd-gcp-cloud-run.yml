name: CI-CD Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - Leavemanagementsystem/**
      - .github/workflows/ci-cd-gcp-cloud-run.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  APP_DIR: Leavemanagementsystem

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B clean test package

      - name: Validate runtime configuration
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
        run: |
          missing=0
          for key in DB_URL DB_USERNAME; do
            if [ -z "${!key}" ]; then
              echo "Missing required GitHub secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Cloud Run deployment requires DB_URL and DB_USERNAME in GitHub Actions secrets."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: ${{ env.APP_DIR }}
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPO }}
        run: |
          # Use secret if valid; otherwise fall back to the known working repository.
          REPOSITORY="${REPOSITORY:-leave-management}"

          if ! gcloud artifacts repositories describe "$REPOSITORY" --location "$REGION" --project "$PROJECT_ID" >/dev/null 2>&1; then
            if gcloud artifacts repositories describe "leave-management" --location "$REGION" --project "$PROJECT_ID" >/dev/null 2>&1; then
              echo "Configured repository '$REPOSITORY' not found. Falling back to 'leave-management'."
              REPOSITORY="leave-management"
            else
              echo "Artifact Registry repository '$REPOSITORY' was not found in region '$REGION'."
              echo "Set GCP_ARTIFACT_REPO to an existing repository or create one first."
              gcloud artifacts repositories list --project "$PROJECT_ID" --location "$REGION" --format="table(name,format,location)"
              exit 1
            fi
          fi

          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/leave-management-app:manual-${{ github.run_number }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          SERVICE: ${{ secrets.GCP_CLOUD_RUN_SERVICE }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --platform managed \
            --set-env-vars "DB_URL=$DB_URL" \
            --set-env-vars "DB_USERNAME=$DB_USERNAME" \
            --set-env-vars "APP_CORS_ALLOWED_ORIGINS=https://leave-management-app-460701269805.asia-south1.run.app" \
            --set-secrets="DB_PASSWORD=DB_PASSWORD:latest" \
            --set-secrets="JWT_SECRET=JWT_SECRET:latest" \
            --allow-unauthenticated
