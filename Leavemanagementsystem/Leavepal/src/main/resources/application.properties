spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties],optional:file:Leavepal/.env[.properties],optional:file:Leavepal/.env.local[.properties]

spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

spring.web.resources.static-locations=classpath:/static/,file:./
server.port=${PORT:${SERVER_PORT:8080}}

jwt.secret=${JWT_SECRET:${APP_JWT_SECRET:}}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:https://leave-management-app-460701269805.asia-south1.run.app,http://localhost:8080,http://localhost:3000}}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

