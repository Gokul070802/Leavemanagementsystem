spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties],optional:file:Leavepal/.env[.properties],optional:file:Leavepal/.env.local[.properties]

spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# HikariCP connection pool tuning for low-latency
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=LeavePalPool
spring.datasource.hikari.keepalive-time=60000

# Hibernate batch & cache
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.web.resources.static-locations=classpath:/static/,file:./
server.port=${PORT:${SERVER_PORT:8080}}

jwt.secret=${JWT_SECRET:${APP_JWT_SECRET:}}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:https://leave-management-app-460701269805.asia-south1.run.app,http://localhost:8080,http://localhost:3000}}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

