<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - LeavePal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="auth-guard.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <svg width="50" height="50" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M12 20L17 25L28 13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="logo-text">LeavePal</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Dashboard
                </a>
                <a href="employee-details.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span id="employeeNavText">Employee Details</span>
                </a>
                <a href="leave-tracker.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    Leave Tracker
                </a>
                <a href="manager-leave-requests.html" id="managerLeaveRequestsNav" class="nav-item" style="display:none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                    <span id="leaveRequestsNavText">Leave Requests</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <div class="header-left">
                    <h2>Edit Profile</h2>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23D4AF37'/%3E%3Ccircle cx='50' cy='35' r='20' fill='%23000'/%3E%3Cpath d='M20 90 Q20 70 50 70 Q80 70 80 90' fill='%23000'/%3E%3C/svg%3E" alt="Profile" class="profile-img">
                        <span class="user-name">Loading...</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-content">
                <div style="display:flex; gap: 10px; margin-bottom: 30px; color: #999; font-size: 13px;">
                    <span>EMPLOYEE</span>
                    <span>›</span>
                    <span>EDIT PROFILE</span>
                </div>
                <div class="leave-form-card" style="padding: 30px;">
                    <h3 style="margin-bottom: 25px;">Basic Info</h3>
                    <form id="editProfileForm">
                        <div class="form-group">
                            <label for="employeeIdInput">Employee ID</label>
                            <input type="text" id="employeeIdInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="emailInput">Email ID</label>
                            <input type="email" id="emailInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="firstNameInput">First Name</label>
                            <input type="text" id="firstNameInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="lastNameInput">Last Name</label>
                            <input type="text" id="lastNameInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="departmentInput">Department</label>
                            <input type="text" id="departmentInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="designationInput">Designation</label>
                            <input type="text" id="designationInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="reportingEmployeeIdInput">Reporting Authority Employee ID</label>
                            <input type="text" id="reportingEmployeeIdInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="locationInput">Location</label>
                            <input type="text" id="locationInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="joiningInput">Date of Joining</label>
                            <input type="text" id="joiningInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="phoneInput">Phone Number</label>
                            <div class="phone-prefix-wrap">
                                <span class="phone-prefix">+91</span>
                                <input type="tel" id="phoneInput" placeholder="10-digit number" maxlength="10" autocomplete="tel-national" required>
                            </div>
                            <div class="field-error" id="phoneError"></div>
                        </div>
                        <div class="form-group">
                            <label for="nationalityInput">Nationality</label>
                            <input type="text" id="nationalityInput" placeholder="e.g. Indian" maxlength="16" autocomplete="off">
                            <div class="field-error" id="nationalityError"></div>
                        </div>
                        <div class="form-group">
                            <label for="bloodGroupInput">Blood Group</label>
                            <select id="bloodGroupInput" required>
                                <option value="">Select blood group</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="maritalStatusInput">Marital Status</label>
                            <select id="maritalStatusInput" required>
                                <option value="">Select marital status</option>
                                <option value="Single">Single</option>
                                <option value="Married">Married</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="dobInput">Date of Birth</label>
                            <input type="date" id="dobInput" required lang="en-GB">
                            <div class="field-error" id="dobError"></div>
                        </div>
                        <div class="form-group">
                            <label for="personalEmailInput">Personal Email</label>
                            <input type="email" id="personalEmailInput" required pattern="^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$" oninput="this.value=this.value.toLowerCase()">
                            <div class="field-error" id="personalEmailError"></div>
                        </div>
                        <div class="form-group">
                            <label for="genderInput">Gender</label>
                            <select id="genderInput" required>
                                <option value="">Select gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="addressInput">Address</label>
                            <input type="text" id="addressInput" maxlength="255" placeholder="Your address" autocomplete="street-address" required>
                            <div class="field-error" id="addressError"></div>
                        </div>
                        <div class="form-buttons" style="margin-top: 30px;">
                            <button type="button" class="cancel-btn" onclick="cancelEdit()">Cancel</button>
                            <button type="submit" class="apply-btn">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="ui-notifications.js"></script>
    <script src="env.js"></script>
    <script src="api-config.js"></script>
    <script src="selenium-hooks.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function notify(message, type = 'info') {
            if (window.showTopRightNotification) {
                window.showTopRightNotification(message, type);
            }
        }

        function removeFieldGroup(inputId) {
            const input = document.getElementById(inputId);
            if (input && input.parentElement) {
                input.parentElement.remove();
            }
        }

        function setFieldValue(inputId, value) {
            const input = document.getElementById(inputId);
            if (input) {
                input.value = value || '';
            }
        }

        function normalizeDateForInput(value) {
            const raw = String(value || '').trim();
            if (!raw) {
                return '';
            }

            if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
                return raw;
            }

            const slashMatch = raw.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
            if (slashMatch) {
                return `${slashMatch[3]}-${slashMatch[2]}-${slashMatch[1]}`;
            }

            const parsed = new Date(raw);
            if (!Number.isNaN(parsed.getTime())) {
                const day = String(parsed.getDate()).padStart(2, '0');
                const month = String(parsed.getMonth() + 1).padStart(2, '0');
                const year = parsed.getFullYear();
                return `${year}-${month}-${day}`;
            }

            return '';
        }

        function formatDateForApi(value) {
            const raw = String(value || '').trim();
            if (!raw) {
                return '';
            }

            const isoMatch = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (isoMatch) {
                return `${isoMatch[3]}/${isoMatch[2]}/${isoMatch[1]}`;
            }

            return raw;
        }

        function validateDOBAge() {
            const dobInput = document.getElementById('dobInput');
            const dobError = document.getElementById('dobError');
            function showDobErr(msg) { if (dobError) { dobError.textContent = msg; dobError.classList.add('visible'); } }
            function clearDobErr() { if (dobError) { dobError.textContent = ''; dobError.classList.remove('visible'); } }
            if (!dobInput || !dobInput.value) { clearDobErr(); return true; }
            const dob = new Date(dobInput.value + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (dob >= today) { showDobErr('Date of birth cannot be today or in the future.'); return false; }
            let age = today.getFullYear() - dob.getFullYear();
            const m = today.getMonth() - dob.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
            if (age < 18) { showDobErr('Employee must be at least 18 years old.'); return false; }
            if (age > 60) { showDobErr('Employee must be no more than 60 years old.'); return false; }
            clearDobErr();
            return true;
        }

        function configureEditProfileFormForRole(role) {
            if (String(role || '').toLowerCase() !== 'admin') {
                return;
            }

            [
                'employeeIdInput',
                'departmentInput',
                'reportingEmployeeIdInput',
                'locationInput',
                'joiningInput',
                'nationalityInput',
                'bloodGroupInput',
                'maritalStatusInput',
                'dobInput',
                'personalEmailInput',
                'genderInput',
                'addressInput'
            ].forEach(removeFieldGroup);
        }

        async function loadEditProfile() {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            if (!loggedInUser.username) {
                window.location.href = 'index.html';
                return;
            }

            const response = await fetch(`/api/users/${encodeURIComponent(loggedInUser.username)}`, {
                headers: getAuthHeaders()
            });
            if (!response.ok) {
                window.location.href = 'index.html';
                return;
            }

            const profile = await response.json();
            setFieldValue('employeeIdInput', profile.employeeId || profile.username || '');
            setFieldValue('emailInput', profile.emailId || '');
            setFieldValue('firstNameInput', profile.firstName || '');
            setFieldValue('lastNameInput', profile.lastName || '');
            setFieldValue('departmentInput', profile.department || '');
            setFieldValue('designationInput', profile.designation || '');
            setFieldValue('reportingEmployeeIdInput', profile.reportingEmployeeId || '');
            setFieldValue('locationInput', profile.location || '');
            setFieldValue('joiningInput', profile.joining || '');
            setFieldValue('phoneInput', (profile.phoneNumber || '').replace(/^\+91/, ''));
            setFieldValue('nationalityInput', profile.nationality || '');
            setFieldValue('bloodGroupInput', profile.bloodGroup || '');
            setFieldValue('maritalStatusInput', profile.maritalStatus || '');
            setFieldValue('dobInput', normalizeDateForInput(profile.dob || ''));
            setFieldValue('personalEmailInput', profile.personalEmail || '');
            setFieldValue('genderInput', profile.gender || '');
            setFieldValue('addressInput', profile.address || '');
        }

        function cancelEdit() {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            if (loggedInUser.role && loggedInUser.role.toLowerCase() === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        async function updateProfile(username) {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            const isAdmin = String(loggedInUser.role || '').toLowerCase() === 'admin';

            // ── Validation (non-admin only; admin fields are removed from DOM) ──
            if (!isAdmin) {
                const phoneVal = document.getElementById('phoneInput').value.trim();
                if (!/^[6-9]\d{9}$/.test(phoneVal)) {
                    document.getElementById('phoneError').textContent = 'Enter a valid 10-digit Indian mobile number.';
                    document.getElementById('phoneError').classList.add('visible');
                    notify('Please fix the highlighted errors.', 'warning');
                    return;
                }
                const natVal = document.getElementById('nationalityInput').value.trim();
                if (natVal && !/^[a-zA-Z\s]{1,16}$/.test(natVal)) {
                    document.getElementById('nationalityError').textContent = 'Nationality must contain letters and spaces only (max 16).';
                    document.getElementById('nationalityError').classList.add('visible');
                    notify('Please fix the highlighted errors.', 'warning');
                    return;
                }
                document.getElementById('nationalityError').textContent = '';
                document.getElementById('nationalityError').classList.remove('visible');

                const personalEmailVal = document.getElementById('personalEmailInput').value.toLowerCase().trim();
                const personalEmailPattern = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
                if (!personalEmailPattern.test(personalEmailVal)) {
                    document.getElementById('personalEmailError').textContent = 'Enter a valid personal email address.';
                    document.getElementById('personalEmailError').classList.add('visible');
                    notify('Please fix the highlighted errors.', 'warning');
                    return;
                }
                document.getElementById('personalEmailError').textContent = '';
                document.getElementById('personalEmailError').classList.remove('visible');

                if (!validateDOBAge()) {
                    notify('Please fix the date of birth.', 'warning');
                    return;
                }
                const addrVal = document.getElementById('addressInput').value.trim();
                if (!addrVal) {
                    document.getElementById('addressError').textContent = 'Address is required.';
                    document.getElementById('addressError').classList.add('visible');
                    notify('Please fix the highlighted errors.', 'warning');
                    return;
                }
                if (!/^[a-zA-Z0-9 /().,'-]{1,255}$/.test(addrVal)) {
                    document.getElementById('addressError').textContent = "Address may only contain letters, numbers, spaces, and / ( ) . , '";
                    document.getElementById('addressError').classList.add('visible');
                    notify('Please fix the highlighted errors.', 'warning');
                    return;
                }
            }

            const profile = {
                phoneNumber: '+91' + document.getElementById('phoneInput').value.trim()
            };

            if (!isAdmin) {
                profile.nationality = document.getElementById('nationalityInput').value;
                profile.bloodGroup = document.getElementById('bloodGroupInput').value;
                profile.maritalStatus = document.getElementById('maritalStatusInput').value;
                profile.dob = formatDateForApi(document.getElementById('dobInput').value);
                profile.personalEmail = document.getElementById('personalEmailInput').value.toLowerCase().trim();
                profile.gender = document.getElementById('genderInput').value;
                profile.address = document.getElementById('addressInput').value;
            }

            const response = await fetch(`/api/users/${encodeURIComponent(username)}`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify(profile)
            });

            if (response.ok) {
                const updatedProfile = await response.json();
                // Preserve the existing token in localStorage
                const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
                const preservedToken = loggedInUser.token;
                const mergedProfile = { ...updatedProfile, token: preservedToken };
                localStorage.setItem('loggedInUser', JSON.stringify(mergedProfile));
                
                // Show success notification
                notify('Profile updated successfully!', 'success');
                
                // Redirect after a short delay to allow user to see notification
                setTimeout(() => {
                    if (updatedProfile.role && updatedProfile.role.toLowerCase() === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1500);
            } else {
                const message = await response.text();
                notify(message || 'Unable to save profile.', 'error');
            }
        }

        function getAuthHeaders() {
            const user = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            const headers = {
                'Content-Type': 'application/json'
            };
            if (user.token) {
                headers['Authorization'] = `Bearer ${user.token}`;
            }
            return headers;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            if (!loggedInUser.username) {
                window.location.href = 'index.html';
                return;
            }

            const fullName = `${loggedInUser.firstName || ''} ${loggedInUser.lastName || ''}`.trim() || 'Loading...';
            document.querySelector('.user-name').textContent = fullName;

            // Manager sidebar: show Leave Requests nav
            if ((loggedInUser.role || '').toLowerCase() === 'manager') {
                const lrNav = document.getElementById('managerLeaveRequestsNav');
                const empNavText = document.getElementById('employeeNavText');
                const lrNavText = document.getElementById('leaveRequestsNavText');
                if (lrNav) lrNav.style.display = 'flex';
                if (empNavText) empNavText.textContent = 'Employees';
                if (lrNavText) lrNavText.textContent = 'Leave Requests';
            }

            configureEditProfileFormForRole(loggedInUser.role);

            await loadEditProfile(loggedInUser.username);

            // DOB: set min (today - 60 years) and max (today - 18 years)
            const dobInput = document.getElementById('dobInput');
            if (dobInput) {
                const now = new Date();
                const maxDob = new Date(now.getFullYear() - 18, now.getMonth(), now.getDate());
                const minDob = new Date(now.getFullYear() - 60, now.getMonth(), now.getDate());
                dobInput.max = maxDob.toISOString().split('T')[0];
                dobInput.min = minDob.toISOString().split('T')[0];
                dobInput.addEventListener('change', validateDOBAge);
            }

            // Phone: digits only, real-time
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            if (phoneInput) {
                phoneInput.addEventListener('input', function () {
                    this.value = this.value.replace(/\D/g, '').slice(0, 10);
                    if (!this.value || /^[6-9]\d{9}$/.test(this.value)) {
                        if (phoneError) { phoneError.textContent = ''; phoneError.classList.remove('visible'); }
                    }
                });
                phoneInput.addEventListener('blur', function () {
                    if (this.value && !/^[6-9]\d{9}$/.test(this.value)) {
                        if (phoneError) { phoneError.textContent = 'Enter a valid 10-digit Indian mobile number.'; phoneError.classList.add('visible'); }
                    }
                });
            }

            // Nationality: letters only, 8-16
            const natInput = document.getElementById('nationalityInput');
            const natError = document.getElementById('nationalityError');
            if (natInput) {
                natInput.addEventListener('input', function () {
                    this.value = this.value.replace(/[^a-zA-Z\s]/g, '').slice(0, 16);
                    if (!this.value || /^[a-zA-Z\s]{1,16}$/.test(this.value)) {
                        if (natError) { natError.textContent = ''; natError.classList.remove('visible'); }
                    }
                });
                natInput.addEventListener('blur', function () {
                    if (this.value && !/^[a-zA-Z\s]{1,16}$/.test(this.value)) {
                        if (natError) { natError.textContent = 'Nationality must contain letters and spaces only (max 16).'; natError.classList.add('visible'); }
                    }
                });
            }

            // Personal email: strict valid format
            const personalEmailInput = document.getElementById('personalEmailInput');
            const personalEmailError = document.getElementById('personalEmailError');
            if (personalEmailInput) {
                const personalEmailPattern = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
                personalEmailInput.addEventListener('input', function () {
                    this.value = this.value.toLowerCase();
                    if (!this.value || personalEmailPattern.test(this.value.trim())) {
                        if (personalEmailError) { personalEmailError.textContent = ''; personalEmailError.classList.remove('visible'); }
                    }
                });
                personalEmailInput.addEventListener('blur', function () {
                    if (this.value && !personalEmailPattern.test(this.value.trim())) {
                        if (personalEmailError) { personalEmailError.textContent = 'Enter a valid personal email address.'; personalEmailError.classList.add('visible'); }
                    }
                });
            }

            // Address: max 255, allowed chars
            const addrInput = document.getElementById('addressInput');
            const addrError = document.getElementById('addressError');
            if (addrInput) {
                addrInput.addEventListener('input', function () {
                    if (!this.value || /^[a-zA-Z0-9 /().,'-]{1,255}$/.test(this.value)) {
                        if (addrError) { addrError.textContent = ''; addrError.classList.remove('visible'); }
                    } else {
                        if (addrError) { addrError.textContent = "Address may only contain letters, numbers, spaces, and / ( ) . , '"; addrError.classList.add('visible'); }
                    }
                });
            }

            const editProfileForm = document.getElementById('editProfileForm');
            editProfileForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                await updateProfile(loggedInUser.username);
            });
        });
    </script>
</body>
</html>
