<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee - LeavePal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="auth-guard.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <svg width="50" height="50" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M12 20L17 25L28 13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="logo-text">LeavePal</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Dashboard
                </a>
                <a href="employee-details.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Employee Details
                </a>
                <a href="leave-tracker.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    Leave Tracker
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <div class="header-left">
                    <h2>Add Employee</h2>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23D4AF37'/%3E%3Ccircle cx='50' cy='35' r='20' fill='%23000'/%3E%3Cpath d='M20 90 Q20 70 50 70 Q80 70 80 90' fill='%23000'/%3E%3C/svg%3E" alt="Profile" class="profile-img">
                        <span class="user-name">Loading...</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-content">
                <div class="employee-form-card">
                    <h3>Basic Info</h3>
                    <div class="employee-form-grid">
                        <div class="form-group">
                            <label>ROLE</label>
                            <select id="role" required>
                                <option value="employee" selected>Employee</option>
                                <option value="manager">Manager</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>EMPLOYEE ID</label>
                            <input type="text" id="employeeId" placeholder="Generating..." readonly>
                        </div>
                    <div class="form-group">
                            <label>EMAIL ID</label>
                            <input type="email" id="emailId" placeholder="user@leavepal.com" required autocomplete="off">
                            <div class="field-error" id="emailError"></div>
                        </div>
                        <div class="form-group">
                            <label>PASSWORD</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="password" placeholder="Enter password" required autocomplete="new-password">
                                <button type="button" class="toggle-password-btn" id="toggleEmpPassword" tabindex="-1" title="Show/hide password">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                            <div class="pwd-strength-wrap">
                                <div class="pwd-strength-track">
                                    <div class="pwd-strength-fill" id="pwdStrengthFill"></div>
                                </div>
                                <span class="pwd-strength-label" id="pwdStrengthLabel"></span>
                            </div>
                            <ul class="pwd-req-list" id="pwdReqList">
                                <li class="pwd-req" id="req-len">8–16 characters</li>
                                <li class="pwd-req" id="req-upper">Uppercase letter (A–Z)</li>
                                <li class="pwd-req" id="req-lower">Lowercase letter (a–z)</li>
                                <li class="pwd-req" id="req-digit">Number (0–9)</li>
                                <li class="pwd-req" id="req-spec">Special character (@#$%^&amp;+=!)</li>
                                <li class="pwd-req" id="req-space">No spaces</li>
                            </ul>
                            <div class="field-error" id="passwordError"></div>
                        </div>
                        <div class="form-group">
                            <label>FIRST NAME</label>
                            <input type="text" id="firstName" placeholder="Enter first name" required autocomplete="off">
                            <div class="field-error" id="firstNameError"></div>
                        </div>
                        <div class="form-group">
                            <label>LAST NAME</label>
                            <input type="text" id="lastName" placeholder="Enter last name" required autocomplete="off">
                            <div class="field-error" id="lastNameError"></div>
                        </div>
                        <div class="form-group">
                            <label>DEPARTMENT</label>
                            <select id="department">
                                <option>Engineering</option>
                                <option>Marketing</option>
                                <option>HR Operations</option>
                                <option>Finance</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>DESIGNATION</label>
                            <input type="text" id="designation" placeholder="Enter designation" autocomplete="off" required>
                            <div class="field-error" id="designationError"></div>
                        </div>
                        <div class="form-group">
                            <label>REPORTING MANAGER</label>
                            <select id="reportingEmployeeId">
                                <option value="">Loading managers...</option>
                            </select>
                            <div id="reportingManagerHint" style="font-size:12px; color:#666; margin-top:8px;">Select the reporting manager for employee accounts.</div>
                        </div>
                        <div class="form-group">
                            <label>LOCATION</label>
                            <input type="text" id="location" placeholder="Enter location" autocomplete="off" required>
                            <div class="field-error" id="locationError"></div>
                        </div>
                        <div class="form-group">
                            <label>DATE OF JOINING</label>
                            <input type="date" id="dateJoining">
                        </div>
                    </div>

                    <div class="form-buttons" style="margin-top: 24px;">
                        <button type="button" class="cancel-btn" onclick="cancelAddEmployee()">Cancel</button>
                        <button type="button" id="saveEmployeeBtn" class="apply-btn" onclick="saveEmployee()">Save</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="ui-notifications.js"></script>
    <script src="env.js"></script>
    <script src="api-config.js"></script>
    <script src="selenium-hooks.js"></script>
    <script>
        let managersCache = [];

        document.addEventListener('DOMContentLoaded', async function() {
            const user = JSON.parse(localStorage.getItem('loggedInUser')) || { role: 'guest' };
            if (user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            document.querySelector('.user-name').textContent = `${user.firstName || ''} ${user.lastName || ''}`.trim() || 'Loading...';
            await loadNextEmployeeId();
            await loadManagers();
            document.getElementById('role').addEventListener('change', applyRoleRules);
            applyRoleRules();

            // Set today's date as default for dateJoining
            const today = new Date().toISOString().split('T')[0];
            const joiningInput = document.getElementById('dateJoining');
            const minDate = new Date();
            minDate.setDate(minDate.getDate() - 7);
            const minDateValue = minDate.toISOString().split('T')[0];

            joiningInput.max = today;
            joiningInput.min = minDateValue;
            joiningInput.value = today;
        });

        function getAuthHeaders() {
            const user = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            const headers = {
                'Content-Type': 'application/json'
            };
            if (user.token) {
                headers['Authorization'] = `Bearer ${user.token}`;
            }
            return headers;
        }

        async function loadNextEmployeeId() {
            try {
                // First try to use the dedicated endpoint
                const response = await fetch('/api/users/next-employee-id', {
                    headers: getAuthHeaders()
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('employeeId').value = data.nextEmployeeId;
                    return;
                }
                
                // Fallback to fetching all users if endpoint not available
                const allUsersResponse = await fetch('/api/users', {
                    headers: getAuthHeaders()
                });
                
                if (!allUsersResponse.ok) {
                    document.getElementById('employeeId').value = 'LP-001';
                    return;
                }

                const users = await allUsersResponse.json();
                const employeeNumbers = users
                    .filter(user => user.role && (user.role.toLowerCase() === 'employee' || user.role.toLowerCase() === 'manager'))
                    .map(user => user.employeeId)
                    .filter(id => typeof id === 'string')
                    .map(id => {
                        const match = id.match(/^LP-(\d{3})$/);
                        return match ? parseInt(match[1], 10) : 0;
                    });

                const nextNumber = employeeNumbers.length > 0 ? Math.max(...employeeNumbers) + 1 : 1;
                document.getElementById('employeeId').value = `LP-${String(nextNumber).padStart(3, '0')}`;
            } catch (error) {
                console.error('Unable to load next employee ID:', error);
                document.getElementById('employeeId').value = 'LP-001';
            }
        }

        async function loadManagers() {
            const reportingSelect = document.getElementById('reportingEmployeeId');
            const hint = document.getElementById('reportingManagerHint');

            try {
                const response = await fetch('/api/users', {
                    headers: getAuthHeaders()
                });

                if (!response.ok) {
                    managersCache = [];
                    reportingSelect.innerHTML = '<option value="">Unable to load managers</option>';
                    hint.textContent = 'Unable to load managers. Please try again.';
                    hint.style.color = '#b91c1c';
                    return;
                }

                const users = await response.json();
                managersCache = users.filter(user => user.role && user.role.toLowerCase() === 'manager');
                populateManagerDropdown();
            } catch (error) {
                console.error('Unable to load managers:', error);
                managersCache = [];
                reportingSelect.innerHTML = '<option value="">Unable to load managers</option>';
                hint.textContent = 'Unable to load managers. Please try again.';
                hint.style.color = '#b91c1c';
            }
        }

        function populateManagerDropdown() {
            const reportingSelect = document.getElementById('reportingEmployeeId');

            if (!managersCache.length) {
                reportingSelect.innerHTML = '<option value="">No managers available</option>';
                return;
            }

            reportingSelect.innerHTML = '<option value="">Select manager</option>' + managersCache.map(manager => {
                const managerId = manager.employeeId || manager.username;
                const managerName = `${manager.firstName || ''} ${manager.lastName || ''}`.trim() || manager.username || managerId;
                return `<option value="${escapeHtml(managerId)}">${escapeHtml(managerName)} (${escapeHtml(managerId)})</option>`;
            }).join('');
        }

        function applyRoleRules() {
            const role = document.getElementById('role').value;
            const reportingSelect = document.getElementById('reportingEmployeeId');
            const hint = document.getElementById('reportingManagerHint');
            const saveButton = document.getElementById('saveEmployeeBtn');

            if (role === 'employee') {
                reportingSelect.disabled = false;
                reportingSelect.required = true;

                if (!managersCache.length) {
                    hint.textContent = 'Create at least one manager before creating an employee.';
                    hint.style.color = '#b91c1c';
                    saveButton.disabled = true;
                } else {
                    hint.textContent = 'Select the reporting manager for employee accounts.';
                    hint.style.color = '#666';
                    saveButton.disabled = false;
                }
                return;
            }

            reportingSelect.required = false;
            reportingSelect.disabled = true;
            reportingSelect.value = '';
            hint.textContent = 'Reporting manager is not required for manager accounts.';
            hint.style.color = '#666';
            saveButton.disabled = false;
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function notify(message, type = 'info') {
            if (window.showTopRightNotification) {
                window.showTopRightNotification(message, type);
            }
        }

        function saveEmployee() {
            // ── Front-end validation ──────────────────────────────────────────────
            const emailOk    = validateEmail();
            const passwordOk = validatePassword();
            const firstOk    = validateAlphaField('firstName',   'firstNameError',   0, 20, 'First name', true);
            const lastOk     = validateAlphaField('lastName',    'lastNameError',    0, 20, 'Last name', true);
            const desigOk    = validateAlphaField('designation', 'designationError', 0, 16, 'Designation', true);
            const locOk      = validateAlphaField('location',    'locationError',    0, 16, 'Location', true);
            if (!emailOk || !passwordOk || !firstOk || !lastOk || !desigOk || !locOk) {
                notify('Please fix the highlighted errors before saving.', 'warning');
                return;
            }

            const selectedRole = document.getElementById('role').value;
            const reportingManager = document.getElementById('reportingEmployeeId').value;
            const joiningValue = document.getElementById('dateJoining').value;

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const minAllowed = new Date(today);
            minAllowed.setDate(minAllowed.getDate() - 7);

            if (!joiningValue) {
                notify('Please select joining date.', 'warning');
                return;
            }

            const selectedJoiningDate = new Date(joiningValue + 'T00:00:00');
            if (Number.isNaN(selectedJoiningDate.getTime())) {
                notify('Joining date is invalid. Use yyyy-MM-dd.', 'warning');
                return;
            }

            if (selectedJoiningDate > today) {
                notify('Joining date cannot be in the future.', 'warning');
                return;
            }

            if (selectedJoiningDate < minAllowed) {
                notify('Joining date cannot be older than 7 days from today.', 'warning');
                return;
            }

            if (selectedRole === 'employee' && managersCache.length === 0) {
                notify('Create at least one manager before creating an employee.', 'warning');
                return;
            }

            if (selectedRole === 'employee' && !reportingManager) {
                notify('Please select a reporting manager.', 'warning');
                return;
            }

            const employee = {
                username: document.getElementById('emailId').value.trim(),
                password: document.getElementById('password').value,
                role: selectedRole,
                employeeId: document.getElementById('employeeId').value,
                emailId: document.getElementById('emailId').value.trim(),
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                department: document.getElementById('department').value,
                designation: document.getElementById('designation').value,
                reportingEmployeeId: selectedRole === 'employee' ? reportingManager : '',
                location: document.getElementById('location').value,
                joining: joiningValue,
            };

            fetch('/api/users', {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(employee),
            })
            .then(response => {
                if (response.ok) {
                    const createdRole = selectedRole === 'manager' ? 'Manager' : 'Employee';
                    notify(`${createdRole} added successfully!`, 'success');
                    window.location.href = 'employee-details.html';
                } else {
                    return response.text().then(text => { throw new Error(text); });
                }
            })
            .catch(error => {
                notify('Error adding employee: ' + error.message, 'error');
            });
        }

        function cancelAddEmployee() {
            window.location.href = 'employee-details.html';
        }

        // ─── Field validation helpers ────────────────────────────────────────────
        function showFieldError(errorId, message) {
            const el = document.getElementById(errorId);
            if (!el) return;
            el.textContent = message;
            el.classList.add('visible');
        }
        function clearFieldError(errorId) {
            const el = document.getElementById(errorId);
            if (!el) return;
            el.textContent = '';
            el.classList.remove('visible');
        }

        function setupAlphaOnlyField(inputId, errorId, min, max, label, allowSpaces) {
            const input = document.getElementById(inputId);
            if (!input) return;
            input.addEventListener('input', function () {
                // Strip non-letter chars and optionally allow spaces in real time.
                const cleaned = allowSpaces
                    ? this.value.replace(/[^a-zA-Z\s]/g, '')
                    : this.value.replace(/[^a-zA-Z]/g, '');
                if (cleaned !== this.value) this.value = cleaned;
                validateAlphaField(inputId, errorId, min, max, label, allowSpaces);
            });
            input.addEventListener('blur', function () {
                validateAlphaField(inputId, errorId, min, max, label, allowSpaces);
            });
        }

        function validateAlphaField(inputId, errorId, min, max, label, allowSpaces) {
            const rawVal = document.getElementById(inputId).value;
            const val = rawVal.trim();
            if (!val) {
                showFieldError(errorId, `${label} is required.`);
                return false;
            }

            const alphaPattern = allowSpaces ? /^[a-zA-Z\s]+$/ : /^[a-zA-Z]+$/;
            if (!alphaPattern.test(rawVal) || !/[a-zA-Z]/.test(rawVal)) {
                showFieldError(errorId, allowSpaces
                    ? `${label} must contain letters and spaces only.`
                    : `${label} must contain letters only.`);
                return false;
            }
            if (min > 0 && val.length < min) {
                showFieldError(errorId, `${label} must be at least ${min} characters.`);
                return false;
            }
            if (val.length > max) {
                showFieldError(errorId, `${label} must be at most ${max} characters.`);
                return false;
            }
            clearFieldError(errorId);
            return true;
        }

        function setupEmailValidation() {
            const input = document.getElementById('emailId');
            if (!input) return;
            const re = /^[a-zA-Z0-9._%+\-]+@leavepal\.com$/;
            input.addEventListener('input', function () {
                if (!this.value || re.test(this.value)) clearFieldError('emailError');
                else showFieldError('emailError', 'Email must be in format user@leavepal.com');
            });
            input.addEventListener('blur', function () {
                if (this.value && !re.test(this.value)) showFieldError('emailError', 'Email must be in format user@leavepal.com');
                else clearFieldError('emailError');
            });
        }

        function validateEmail() {
            const val = document.getElementById('emailId').value.trim();
            const re = /^[a-zA-Z0-9._%+\-]+@leavepal\.com$/;
            if (!val) { showFieldError('emailError', 'Email is required.'); return false; }
            if (!re.test(val)) { showFieldError('emailError', 'Email must be in format user@leavepal.com'); return false; }
            clearFieldError('emailError');
            return true;
        }

        // ─── Password strength ───────────────────────────────────────────────────
        const PWD_RULES = [
            { id: 'req-len',   test: v => v.length >= 8 && v.length <= 16,    label: '8–16 characters' },
            { id: 'req-upper', test: v => /[A-Z]/.test(v),                    label: 'Uppercase letter' },
            { id: 'req-lower', test: v => /[a-z]/.test(v),                    label: 'Lowercase letter' },
            { id: 'req-digit', test: v => /[0-9]/.test(v),                    label: 'Number' },
            { id: 'req-spec',  test: v => /[@#$%^&+=!]/.test(v),              label: 'Special character' },
            { id: 'req-space', test: v => !/\s/.test(v) && v.length > 0,      label: 'No spaces' },
        ];
        const STRENGTH_LEVELS = [
            { label: '', color: '#3a3a3a', pct: 0 },
            { label: 'Very Weak', color: '#e53e3e', pct: 17 },
            { label: 'Weak',      color: '#e97b2e', pct: 33 },
            { label: 'Fair',      color: '#d4a017', pct: 50 },
            { label: 'Good',      color: '#a0c040', pct: 67 },
            { label: 'Strong',    color: '#38a169', pct: 83 },
            { label: 'Perfect',   color: '#2f855a', pct: 100 },
        ];

        function setupPasswordStrength() {
            const input = document.getElementById('password');
            if (!input) return;
            input.addEventListener('input', function () {
                updatePasswordStrength(this.value);
                if (!this.value) clearFieldError('passwordError');
            });
            input.addEventListener('blur', function () {
                validatePassword();
            });
            // Toggle show/hide
            const toggleBtn = document.getElementById('toggleEmpPassword');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function () {
                    input.type = input.type === 'password' ? 'text' : 'password';
                });
            }
        }

        function updatePasswordStrength(val) {
            const score = PWD_RULES.reduce((acc, rule) => acc + (rule.test(val) ? 1 : 0), 0);
            PWD_RULES.forEach(rule => {
                const li = document.getElementById(rule.id);
                if (li) li.className = 'pwd-req' + (rule.test(val) ? ' met' : '');
            });
            const level = val.length === 0 ? STRENGTH_LEVELS[0] : STRENGTH_LEVELS[score];
            const fill = document.getElementById('pwdStrengthFill');
            const lbl  = document.getElementById('pwdStrengthLabel');
            if (fill) { fill.style.width = level.pct + '%'; fill.style.backgroundColor = level.color; }
            if (lbl)  { lbl.textContent = level.label; lbl.style.color = level.color; }
        }

        function validatePassword() {
            const val = document.getElementById('password').value;
            if (!val) { showFieldError('passwordError', 'Password is required.'); return false; }
            const failed = PWD_RULES.filter(r => !r.test(val));
            if (failed.length) {
                showFieldError('passwordError', 'Password does not meet all requirements above.');
                return false;
            }
            clearFieldError('passwordError');
            return true;
        }

        // Initialise all real-time validation after DOM ready
        document.addEventListener('DOMContentLoaded', function () {
            setupEmailValidation();
            setupPasswordStrength();
            setupAlphaOnlyField('firstName',   'firstNameError',   0, 20, 'First name', true);
            setupAlphaOnlyField('lastName',    'lastNameError',    0, 20, 'Last name', true);
            setupAlphaOnlyField('designation', 'designationError', 0, 16, 'Designation', true);
            setupAlphaOnlyField('location',    'locationError',    0, 16, 'Location', true);
        });
    </script>
</body>
</html>
