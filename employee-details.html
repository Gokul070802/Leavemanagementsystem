<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Details - LeavePal</title>
    <link rel="stylesheet" href="dashboard-styles.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <svg width="50" height="50" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M12 20L17 25L28 13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="logo-text">LeavePal</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Dashboard
                </a>
                <a href="employee-details.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Employee Details
                </a>
                <a href="leave-tracker.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    Leave Tracker
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <div class="header-left">
                    <h2>Employees</h2>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23D4AF37'/%3E%3Ccircle cx='50' cy='35' r='20' fill='%23000'/%3E%3Cpath d='M20 90 Q20 70 50 70 Q80 70 80 90' fill='%23000'/%3E%3C/svg%3E" alt="Profile" class="profile-img">
                        <span class="user-name">Alex Rivera</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-content">
                <div class="page-header-row">
                    <div>
                        <h1 class="page-heading">Employee Records</h1>
                        <p class="page-subtitle">Manage and view detailed records of all active employees.</p>
                    </div>
                    <button class="primary-btn" onclick="window.location.href='add-employee.html'">+ ADD EMPLOYEE</button>
                </div>

                <div class="summary-card small-card">
                    <span>TOTAL STAFF</span>
                    <strong id="totalStaff">0</strong>
                    <span class="metric-note">+12%</span>
                </div>

                <div class="table-card">
                    <table class="employee-table">
                        <thead>
                            <tr>
                                <th>EMPLOYEE ID</th>
                                <th>FULL NAME</th>
                                <th>DESIGNATION</th>
                                <th>DEPARTMENT</th>
                                <th>EMAIL</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = JSON.parse(localStorage.getItem('loggedInUser')) || { role: 'guest' };
            if (user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            loadEmployees();
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function loadEmployees() {
            const defaultEmployees = [
                { id: 'EMP-001', initials: 'SC', name: 'Sarah Connor', designation: 'Product Lead', department: 'Engineering', email: 'sarah.c@leavepal.io' },
                { id: 'EMP-002', initials: 'MW', name: 'Marcus Wright', designation: 'Senior UI Designer', department: 'Creative', email: 'marcus.w@leavepal.io' },
                { id: 'EMP-003', initials: 'KL', name: 'Kyle Lewis', designation: 'Talent Manager', department: 'HR Operations', email: 'kyle.l@leavepal.io' },
                { id: 'EMP-004', initials: 'ER', name: 'Elena Rossi', designation: 'Lead QA', department: 'Engineering', email: 'elena.r@leavepal.io' }
            ];

            const storedEmployees = JSON.parse(localStorage.getItem('employeeList')) || [];
            const employees = defaultEmployees.concat(storedEmployees.map(emp => ({
                id: emp.employeeId || 'N/A',
                initials: (emp.firstName ? emp.firstName.charAt(0).toUpperCase() : 'E') + (emp.lastName ? emp.lastName.charAt(0).toUpperCase() : ''),
                name: `${emp.firstName || ''} ${emp.lastName || ''}`.trim(),
                designation: emp.designation || '—',
                department: emp.department || '—',
                email: emp.emailId || '—'
            })));

            const tbody = document.getElementById('employeeTableBody');
            tbody.innerHTML = employees.map(emp => `
                <tr>
                    <td>${emp.id}</td>
                    <td><span class="avatar-badge">${emp.initials}</span>${emp.name}</td>
                    <td>${emp.designation}</td>
                    <td>${emp.department}</td>
                    <td>${emp.email}</td>
                    <td><button class="secondary-btn" onclick="viewProfile('${emp.id}')">VIEW PROFILE</button></td>
                </tr>
            `).join('');

            document.getElementById('totalStaff').textContent = employees.length;
        }

        function viewProfile(employeeId) {
            alert('Open profile for ' + employeeId);
        }
    </script>
</body>
</html>
